services:
  algo-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:80"  # backend listens on port 80 inside the container
    networks:
      - appnet

  algo-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # Frontend connects to the backend via WebSocket.
      # In the proxy setup, this should be the external host exposed by Caddy.
      VITE_BACKEND_WS_URL: "wss://algo-backend.froemosen.dk"
    ports:
      - "5173:5173"
    networks:
      - appnet

  caddy:
    image: caddy:2
    ports:
      - "80:80"  # expose both frontend and backend behind a host-based router
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - algo-backend
      - algo-frontend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
